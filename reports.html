<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reports — Tiffin Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div class="brand">
      <div class="brand__mark">TL</div>
      <div>
        <div class="brand__title">Tiffin Ledger</div>
        <div class="brand__subtitle">Reports</div>
      </div>
    </div>
    <div class="nav-actions">
      <a class="btn btn--ghost" href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a class="btn btn--ghost" href="order.html"><i class="fa-solid fa-bowl-food"></i> Order Food</a>
      <button class="btn btn--ghost" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </header>

  <div class="nav-actions" style="margin-bottom:18px;">
    <button class="btn btn--primary report-tab report-tab--active" data-scope="daily">Daily</button>
    <button class="btn btn--ghost report-tab" data-scope="monthly">Monthly</button>
    <button class="btn btn--ghost report-tab" data-scope="yearly">Yearly</button>
  </div>

  <section class="receipt-card">
    <div class="admin-toolbar">
      <div id="scope-daily" class="report-scope">
        <div class="field">
          <label for="daily-date-picker">Date</label>
          <input type="date" id="daily-date-picker" />
        </div>
      </div>
      <div id="scope-monthly" class="report-scope" hidden>
        <div class="field">
          <label for="month-picker">Month</label>
          <input type="month" id="month-picker" />
        </div>
      </div>
      <div id="scope-yearly" class="report-scope" hidden>
        <div class="field">
          <label for="year-picker">Year</label>
          <input type="number" id="year-picker" min="2020" max="2100" />
        </div>
      </div>

      <div class="export-actions">
        <button class="btn btn--teal btn--small" id="export-pdf"><i class="fa-solid fa-file-pdf"></i> PDF</button>
        <button class="btn btn--ghost btn--small" id="export-txt"><i class="fa-solid fa-file-lines"></i> TXT</button>
      </div>
    </div>

    <p class="eyebrow" id="report-summary">—</p>

    <div style="overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse; font-size:14px;">
        <thead>
          <tr style="text-align:left; border-bottom:2px solid var(--line);">
            <th style="padding:10px 8px;">Date</th>
            <th style="padding:10px 8px;">Meal</th>
            <th style="padding:10px 8px;">Food</th>
            <th style="padding:10px 8px;">Qty</th>
            <th style="padding:10px 8px;">Price</th>
            <th style="padding:10px 8px;">Line Total</th>
          </tr>
        </thead>
        <tbody id="report-table-body">
          <tr><td colspan="6" class="report-loading">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="js/reports.js"></script>
</body>
</html>
